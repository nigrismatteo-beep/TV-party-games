<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intesa Vincente · TV Party Games</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-animated">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="scanlines"></div>
  </div>
  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen active">
    <a href="../../index.html" class="back-btn">← HOME</a>
    <div class="setup-box">
      <div class="game-badge">GIOCO 01</div>
      <h1 class="game-title">Intesa<br><span>Vincente</span></h1>
      <p class="game-tagline">Fai indovinare più parole possibili al tuo team!</p>
      <div class="setup-options">
        <div class="option-group">
          <label>Tempo per turno</label>
          <div class="btn-group" id="time-selector">
            <button class="opt-btn" data-value="30">30s</button>
            <button class="opt-btn active" data-value="60">60s</button>
            <button class="opt-btn" data-value="90">90s</button>
            <button class="opt-btn" data-value="120">120s</button>
          </div>
        </div>
        <div class="option-group">
          <label>Numero di turni</label>
          <div class="btn-group" id="rounds-selector">
            <button class="opt-btn" data-value="1">1</button>
            <button class="opt-btn active" data-value="3">3</button>
            <button class="opt-btn" data-value="5">5</button>
            <button class="opt-btn" data-value="10">10</button>
          </div>
        </div>
      </div>
      <button class="start-btn" id="start-game-btn">
        <span>INIZIA IL GIOCO</span>
        <div class="btn-shine"></div>
      </button>
      <p class="keyboard-hint">
        <kbd>SPAZIO</kbd> Parola corretta &nbsp;|&nbsp;
        <kbd>P</kbd> Passa &nbsp;|&nbsp;
        <kbd>F</kbd> Fullscreen
      </p>
    </div>
  </div>
  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div class="game-hud">
      <div class="hud-left">
        <div class="hud-label">PUNTEGGIO</div>
        <div class="hud-value" id="score-display">0</div>
      </div>
      <div class="hud-center">
        <div class="timer-ring-wrapper">
          <svg class="timer-ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52"/>
          </svg>
          <div class="timer-text" id="timer-display">60</div>
        </div>
      </div>
      <div class="hud-right">
        <div class="hud-label">TURNO</div>
        <div class="hud-value" id="round-display">1 / 3</div>
      </div>
    </div>
    <div class="word-stage">
      <div class="word-box" id="word-box">
        <div class="word-category" id="word-category">PREMI AVVIA</div>
        <div class="word-main" id="word-main">—</div>
      </div>
      <div class="feedback-flash" id="feedback-flash"></div>
    </div>
    <div class="action-bar">
      <button class="action-btn btn-pass" id="btn-pass">
        <span class="btn-icon">⏭</span>
        <span class="btn-label">PASSA</span>
        <span class="btn-key">P</span>
      </button>
      <button class="action-btn btn-start-round" id="btn-start-round">
        <span class="btn-icon">▶</span>
        <span class="btn-label">AVVIA TURNO</span>
      </button>
      <button class="action-btn btn-correct" id="btn-correct">
        <span class="btn-icon">✓</span>
        <span class="btn-label">CORRETTO</span>
        <span class="btn-key">SPAZIO</span>
      </button>
    </div>
  </div>
  <!-- END SCREEN -->
  <div id="screen-end" class="screen">
    <div class="end-box">
      <div class="end-trophy">🏆</div>
      <h2 class="end-title">PARTITA FINITA!</h2>
      <div class="end-score-label">Punteggio Totale</div>
      <div class="end-score" id="end-score">0</div>
      <div class="end-stats" id="end-stats"></div>
      <div class="end-actions">
        <button class="start-btn" id="play-again-btn">GIOCA ANCORA</button>
        <a href="../../index.html" class="back-home-btn">← TORNA AL MENU</a>
      </div>
    </div>
  </div>
  <script src="words.js"></script>
  <script src="game.js"></script>
</body>
</html>
